name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies - perfect-pixel-ts
        working-directory: perfect-pixel-ts
        run: npm install

      - name: Build perfect-pixel-ts
        working-directory: perfect-pixel-ts
        run: npm run build

      - name: Install dependencies - perfect-pixel-cli
        working-directory: perfect-pixel-cli
        run: npm install

      - name: Build perfect-pixel-cli
        working-directory: perfect-pixel-cli
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

